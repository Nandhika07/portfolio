<!DOCTYPE html>
<html>
<head>
    <title>Nandhika's Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Nandhika</h1>
        <p>Aspiring Developer</p>
    </header>

    <section>
        <h2>About Me</h2>
        <p>
            I am a student passionate about learning web development
            and building useful applications.
        </p>
    </section>

    <section>
        <h2>Skills</h2>
        <ul>
            <li>HTML</li>
            <li>CSS</li>
            <li>JavaScript</li>
            <li>Node.js</li>
        </ul>
    </section>

   

    <section>
        <h2>Contact</h2>
        <p>Email: nandhika@example.com</p>
    </section>

    <footer>
        <p>© 2026 Nandhika Portfolio</p>
    </footer>
<section>
    <h2>Projects</h2>
    <div id="projects-container"></div>
</section>

<script>
    fetch('/api/projects')
        .then(res => res.json())
        .then(projects => {
            const container = document.getElementById('projects-container');
            projects.forEach(project => {
                container.innerHTML += `
                    <div style="background:#1e1e2e; padding:20px; margin:10px 0; border-radius:8px;">
                        <h3 style="color:#60a5fa;">${project.title}</h3>
                        <p>${project.description}</p>
                        <p><strong>Tech:</strong> ${project.tech.join(', ')}</p>
                    </div>
                `;
            });
        });
</script>
</body>
</html>
